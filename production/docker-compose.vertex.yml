version: '3.8'

services:
  backend:
    build: 
      context: ..
      dockerfile: production/Dockerfile.vertex
    ports:
      - "8000:8000"
    environment:
      # Supabase Configuration
      - SUPABASE_URL=${SUPABASE_URL:-https://ienrlqnjfnoimuuoxmpp.supabase.co}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_BUCKET_IMAGES=${SUPABASE_BUCKET_IMAGES:-defect-images}
      - SUPABASE_BUCKET_REPORTS=${SUPABASE_BUCKET_REPORTS:-defect-reports}
      
      # Vertex AI Configuration (from ADC - no API keys needed)
      - PROJECT_ID=stroyka-489218
      - LOCATION=us-central1
      
      # Application Configuration
      - BACKEND_BASE_URL=${BACKEND_BASE_URL:-http://localhost:8000}
      - NODE_ENV=production
      - DAILY_LIMIT=${DAILY_LIMIT:-1000}
      
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./production/nginx.conf:/etc/nginx/nginx.conf
      - ./production/ssl:/etc/nginx/ssl
      - ./web/build:/usr/share/nginx/html
    depends_on:
      - backend
    restart: unless-stopped

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
